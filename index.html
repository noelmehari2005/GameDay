<!doctype html>
<html lang="en"  data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HangMan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <style>
    body {
      text-align: center;
      padding-top: 50px;
    }
    .letter-btn {
      width: 40px;
      margin: 3px;
    }
    #wordDisplay {
      font-size: 2rem;
      letter-spacing: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 class="mb-4">🎯 Hangman</h1>

    <div id="wordDisplay" class="mb-4">_ _ _ _</div>

    <p>Wrong guesses: <span id="wrongLetters"></span></p>
    <p>Remaining tries: <span id="tries">6</span></p>

    <div id="keyboard" class="mb-4"></div>

    <div id="message" class="mt-3 fs-4"></div>

    <button class="btn btn-primary mt-3" onclick="startGame()">Restart Game</button>
  </div>

  <script>
    const wordData = JSON.stringify({
      words: ["javascript", "bootstrap", "hangman", "coding", "developer"]
    });

    const parsedData = JSON.parse(wordData);
    const words = parsedData.words;

    let selectedWord = "";
    let guessedLetters = [];
    let wrongLetters = [];
    let maxTries = 6;

    function startGame() {
      selectedWord = words[Math.floor(Math.random() * words.length)];
      guessedLetters = [];
      wrongLetters = [];
      maxTries = 6;

      document.getElementById("message").textContent = "";
      updateDisplay();
      createKeyboard();
    }

    function updateDisplay() {
      const display = selectedWord
        .split("")
        .map(letter => guessedLetters.includes(letter) ? letter : "_")
        .join(" ");

      document.getElementById("wordDisplay").textContent = display;
      document.getElementById("wrongLetters").textContent = wrongLetters.join(", ");
      document.getElementById("tries").textContent = maxTries;

      checkGameStatus(display);
    }

    function createKeyboard() {
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      for (let i = 65; i <= 90; i++) {
        const letter = String.fromCharCode(i).toLowerCase();

        const btn = document.createElement("button");
        btn.textContent = letter;
        btn.className = "btn btn-outline-light letter-btn";

        btn.onclick = () => handleGuess(letter, btn);

        keyboard.appendChild(btn);
      }
    }

    function handleGuess(letter, button) {
      button.disabled = true;

      if (selectedWord.includes(letter)) {
        guessedLetters.push(letter);
      } else {
        wrongLetters.push(letter);
        maxTries--;
      }

      updateDisplay();
    }

    function checkGameStatus(display) {
      if (!display.includes("_")) {
        document.getElementById("message").textContent = "🎉 You Win!";
        disableAllButtons();
      } else if (maxTries <= 0) {
        document.getElementById("message").textContent = `💀 You Lose! Word was "${selectedWord}"`;
        disableAllButtons();
      }
    }

    function disableAllButtons() {
      document.querySelectorAll(".letter-btn").forEach(btn => btn.disabled = true);
    }

    startGame();
  </script>

  </body>
</html>
